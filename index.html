<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tủ Sách Trực Tuyến</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-top">
      <h1>📚 Tủ Sách Trực Tuyến</h1>
      <button id="theme-toggle" class="btn theme-toggle" type="button">🌙 Dark mode</button>
    </div>
    <p>Ưu tiên đọc trực tiếp PDF nếu có sẵn, fallback sang review .txt khi cần.</p>
  </header>

  <main class="container">
    <section id="category-bar" class="category-bar" aria-label="Phân loại sách"></section>
    <section id="book-grid" class="book-grid" aria-live="polite"></section>

    <section id="reader" class="reader" hidden>
      <div class="reader-content">
        <h2 id="reader-title"></h2>
        <p id="reader-meta" class="meta"></p>
        <iframe id="pdf-frame" class="pdf-frame" title="Trình đọc PDF" hidden></iframe>
        <pre id="review-text" class="review-text" hidden></pre>
      </div>
      <div class="reader-actions-wrap">
        <div class="reader-actions">
          <button id="close-reader" class="btn" type="button">Đóng</button>
        </div>
      </div>
    </section>

    <p id="empty" class="empty" hidden>Không có sách trong phân loại này.</p>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
