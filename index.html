<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tủ Sách Trực Tuyến</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-top">
      <h1>📚 Tủ Sách Trực Tuyến</h1>
      <button id="theme-toggle" class="btn theme-toggle" type="button">🌙 Dark mode</button>
    </div>
    <p>Ảnh bìa lấy từ trang đầu PDF, có phân loại dạng sticky và trình đọc tối ưu cho điện thoại.</p>
  </header>

  <main class="container">
    <section id="category-bar" class="category-bar" aria-label="Phân loại sách"></section>
    <section id="book-grid" class="book-grid" aria-live="polite"></section>

    <section id="reader" class="reader" hidden>
      <div class="reader-canvas-wrap">
        <canvas id="reader-canvas"></canvas>
      </div>
      <div class="reader-actions-wrap">
        <div class="reader-actions">
          <button id="close-reader" class="btn" type="button">Đóng</button>
          <button id="prev-page" class="btn" type="button">◀</button>
          <span id="page-info">1 / 1</span>
          <button id="next-page" class="btn" type="button">▶</button>
          <button id="zoom-out" class="btn" type="button">A-</button>
          <button id="zoom-in" class="btn" type="button">A+</button>
        </div>
      </div>
    </section>

    <p id="empty" class="empty" hidden>Không có sách trong phân loại này.</p>
  </main>

  <script type="module" src="https://raw.githubusercontent.com/hickwhither/toideptrai-webngayhoisach/refs/heads/master/app.js"></script>
</body>
</html>
